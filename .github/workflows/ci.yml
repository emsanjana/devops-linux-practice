name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r docker-compose-flask-postgres/app/requirements.txt

    - name: Build Docker Image
      run: |
        docker build -t flask-ci-test docker-compose-flask-postgres/app

    - name: Verify Docker Build
      run: |
        docker images
